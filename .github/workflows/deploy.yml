name: Deploy to Cafe24 FTP

# 어떤 이벤트가 발생했을 때 작동할지 설정 (main 브랜치에 push 될 때)
on:
  push:
    branches:
      - main  # master 브랜치를 사용 중이라면 master로 변경하세요.

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
      # 1. GitHub 저장소의 최신 코드를 불러옵니다.
      - name: 🚚 Get latest code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      
      # 2. FTP로 코드를 전송합니다.
      - name: 📂 Sync files
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # cafe24의 웹 루트 폴더 위치를 지정합니다 (보통 www 또는 public_html)
          server-dir: /www/ 
          
          # 업로드에서 제외할 파일이나 폴더 설정 (필요시 수정)
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .github/**
